<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#12615d" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>BNOW</title>
  </head>
  <body>
    <main class="workspace-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">BNOW Workspace</p>
          <h1>비노우 메인보드</h1>
        </div>
        <div class="header-actions">
          <span class="sync-status sync-local" id="syncStatus">로컬 저장</span>
          <button class="dashboard-button" type="button" onclick="window.open('https://checkinout-3gkty6vq2-bnowkr.vercel.app/check', '_blank', 'noopener,noreferrer')">출퇴근</button>
          <button class="dashboard-button" type="button" onclick="window.location.href='/workboard/'">대시보드로 돌아가기</button>
          <a class="ghost-button nav-button" href="recommendations.html">정부과제 추천시스템</a>
          <button class="ghost-button" id="exportButton" type="button">CSV 내보내기</button>
        </div>
      </header>

      <section class="summary-grid" aria-label="정부과제 현황">
        <article class="metric-panel"><span class="metric-label">전체 과제</span><strong id="totalCount">0</strong></article>
        <article class="metric-panel"><span class="metric-label">해야 할 과제</span><strong id="pendingCount">0</strong></article>
        <article class="metric-panel"><span class="metric-label">7일 이내 마감</span><strong id="dueSoonCount">0</strong></article>
        <article class="metric-panel"><span class="metric-label">합격</span><strong id="passedCount">0</strong></article>
        <article class="metric-panel metric-panel-wide"><span class="metric-label">합격 지원금 합계</span><strong><span id="passedAmountTotal">0</span><small>만원</small></strong></article>
      </section>

      <section class="control-band" aria-label="과제 등록">
        <form class="task-form" id="taskForm">
          <div class="form-grid">
            <label class="name-field"><span>과제명</span><input id="taskName" name="taskName" type="text" autocomplete="off" required /></label>
            <label><span>마감일</span><input id="dueDate" name="dueDate" type="date" /></label>
            <label><span>제출일</span><input id="submittedDate" name="submittedDate" type="date" /></label>
            <label>
              <span>상태</span>
              <select id="resultStatus" name="resultStatus">
                <option value="검토중">검토중</option>
                <option value="준비중">준비중</option>
                <option value="제출완료">제출완료</option>
                <option value="합격">합격</option>
                <option value="불합격">불합격</option>
                <option value="지원못함">지원못함</option>
                <option value="보류">보류</option>
              </select>
            </label>
            <label><span>지원금(만원)</span><input id="grantAmount" name="grantAmount" type="number" min="0" step="1" inputmode="numeric" placeholder="예: 5000" /></label>
            <label class="notice-field"><span>공고/링크</span><input id="noticeUrl" name="noticeUrl" type="url" autocomplete="off" placeholder="https://..." /></label>
          </div>
          <div class="form-actions">
            <button class="primary-button" id="saveTaskButton" type="submit">과제 추가</button>
            <button class="ghost-button" id="resetFormButton" type="button">입력 초기화</button>
          </div>
        </form>
      </section>

      <section class="board-toolbar" aria-label="목록 도구">
        <div class="search-wrap"><span aria-hidden="true">⌕</span><input id="searchInput" type="search" placeholder="과제명, 상태, 링크 검색" /></div>
        <div class="toolbar-controls">
          <label class="page-size-control"><span>보기</span><select id="pageSizeSelect" aria-label="페이지당 표시 개수"><option value="10">10개</option><option value="20" selected>20개</option><option value="50">50개</option><option value="100">100개</option></select></label>
          <div class="status-tabs" id="statusTabs" role="tablist" aria-label="상태별 과제 목록">
            <button class="status-tab is-active" type="button" role="tab" aria-selected="true" data-status-view="main">메인 <span data-status-count="main">0</span></button>
            <button class="status-tab" type="button" role="tab" aria-selected="false" data-status-view="제출완료">제출완료 <span data-status-count="제출완료">0</span></button>
            <button class="status-tab" type="button" role="tab" aria-selected="false" data-status-view="합격">합격 <span data-status-count="합격">0</span></button>
            <button class="status-tab" type="button" role="tab" aria-selected="false" data-status-view="불합격">불합격 <span data-status-count="불합격">0</span></button>
            <button class="status-tab" type="button" role="tab" aria-selected="false" data-status-view="지원못함">지원못함 <span data-status-count="지원못함">0</span></button>
            <button class="status-tab" type="button" role="tab" aria-selected="false" data-status-view="보류">보류 <span data-status-count="보류">0</span></button>
          </div>
          <div class="pagination-controls" aria-label="페이지 이동"><button class="ghost-button page-button" id="prevPageButton" type="button">이전</button><span id="pageInfo">1 / 1</span><button class="ghost-button page-button" id="nextPageButton" type="button">다음</button></div>
        </div>
      </section>

      <section class="board-section" aria-label="정부과제 리스트">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>순번</th><th>과제명</th><th>마감일</th><th>제출일</th><th>상태</th><th>지원금</th><th>공고/메모</th><th>관리</th></tr>
            </thead>
            <tbody id="taskTableBody"></tbody>
          </table>
          <div class="empty-state" id="emptyState"><strong>등록된 정부과제가 없습니다.</strong><span>구글시트 데이터를 반영하거나 직접 과제를 추가하세요.</span></div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
