<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사내 프로젝트 업무보드</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#172033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}.login{min-height:100vh;display:grid;place-items:center;padding:24px;background:#eef3f8}.login-card{width:min(430px,100%);background:white;border:1px solid #dbe3ee;border-radius:8px;padding:28px;box-shadow:0 18px 50px rgba(20,30,50,.12)}h1,h2,h3,p{margin-top:0}.login-card h1{font-size:24px;margin-bottom:8px}.login-card p,.muted{color:#66758a;font-size:13px}.field{margin-bottom:14px}.field label{display:block;margin-bottom:6px;font-size:13px;font-weight:700;color:#475569}.field input,.field select,.field textarea{width:100%;border:1px solid #cbd5e1;border-radius:6px;padding:10px;background:white}.field textarea{min-height:110px;resize:vertical}.btn{border:0;border-radius:6px;background:#2563eb;color:white;padding:10px 15px;font-weight:750}.btn:hover{background:#1d4ed8}.btn.gray{background:#475569}.btn.light{background:white;color:#dbeafe;border:1px solid #64748b}.btn.full{width:100%}.error{color:#dc2626;font-size:13px;min-height:18px;margin-top:8px}.app{display:none}.top{background:#1e293b;color:white;padding:17px 32px;display:flex;justify-content:space-between;align-items:center;gap:14px}.top h1{font-size:22px;margin:0}.user{display:flex;align-items:center;gap:10px;font-size:14px;color:#dbeafe}.bar,.wrap{max-width:1440px;margin:0 auto;padding:0 18px}.bar{margin-top:22px;display:flex;align-items:center;justify-content:space-between;gap:14px}.bar h2{font-size:20px;margin-bottom:4px}.grid{margin-top:22px;display:grid;grid-template-columns:310px minmax(0,1fr);gap:22px}.panel{background:white;border:1px solid #e2e8f0;border-radius:8px;padding:20px;margin-bottom:20px;box-shadow:0 1px 3px rgba(15,23,42,.05)}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.panel h2{font-size:18px;margin:0}.table-scroll{overflow-x:auto}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #e5ebf2;padding:12px 13px;text-align:left;font-size:14px;vertical-align:middle}th{background:#f8fafc;color:#64748b;font-weight:800}tbody tr:hover{background:#f8fafc}.active{background:#eff6ff!important}.title-cell{min-width:250px;display:flex;align-items:center;gap:8px}.badge{display:inline-block;border-radius:4px;padding:4px 8px;font-size:12px;font-weight:800;white-space:nowrap}.wait{background:#fef3c7;color:#a16207}.prog{background:#dbeafe;color:#1d4ed8}.done{background:#dcfce7;color:#15803d}.alert{background:#fee2e2;color:#b91c1c}.soft{background:#e0f2fe;color:#0369a1}.notice-list{display:grid;gap:9px}.notice{width:100%;display:flex;justify-content:space-between;gap:10px;text-align:left;border:1px solid #e2e8f0;border-radius:6px;background:#f8fafc;padding:10px 12px;color:#334155}.notice.red{background:#fff1f2;border-color:#fda4af}.notice.orange{background:#fff7ed;border-color:#fdba74}.detail-meta{display:flex;flex-wrap:wrap;gap:10px 18px;background:#f8fafc;border-radius:6px;padding:10px;color:#475569;font-size:13px;margin:12px 0}.content{white-space:pre-line;line-height:1.6;background:#fafafa;border-left:4px solid #cbd5e1;padding:14px;margin-bottom:22px}.comment{background:#f8fafc;border:1px solid #edf2f7;border-radius:6px;padding:12px 14px;margin-bottom:10px}.comment.unread{background:#fff7f7;border-color:#fca5a5}.comment-meta{display:flex;justify-content:space-between;gap:10px;color:#64748b;font-size:12px;margin-bottom:6px}.comment-form{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;margin-top:12px}.comment-form input{border:1px solid #cbd5e1;border-radius:6px;padding:10px}.modal-back{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:20;align-items:center;justify-content:center;padding:20px}.modal-back.open{display:flex}.modal{background:white;border-radius:8px;border:1px solid #dbe3ee;width:min(560px,100%);max-height:calc(100vh - 40px);overflow:auto;padding:22px;box-shadow:0 25px 70px rgba(15,23,42,.28)}.modal-head{display:flex;justify-content:space-between;gap:12px;margin-bottom:16px}.modal-head h2{font-size:20px;margin-bottom:4px}.actions{display:flex;justify-content:flex-end;gap:10px}.hidden{display:none!important}@media(max-width:920px){.top{padding:16px 18px;align-items:flex-start;flex-direction:column}.bar{align-items:stretch;flex-direction:column}.grid{grid-template-columns:1fr}.comment-form{grid-template-columns:1fr}.btn{width:100%}th,td{padding:10px}.title-cell{min-width:210px}}
</style>
</head>
<body>
<section id="loginScreen" class="login">
  <div class="login-card">
    <h1>업무보드 로그인</h1>
    <p>팀원 계정으로 로그인하면 프로젝트, 댓글, 읽음 상태가 함께 공유됩니다.</p>
    <form id="loginForm">
      <div class="field"><label for="loginEmail">로그인 아이디</label><input id="loginEmail" type="email" autocomplete="username" required placeholder="name@bnow.co.kr"></div>
      <div class="field"><label for="loginPassword">비밀번호</label><input id="loginPassword" type="password" autocomplete="current-password" required></div>
      <button class="btn full" type="submit">로그인</button>
      <div id="loginError" class="error"></div>
    </form>
  </div>
</section>

<main id="app" class="app">
  <header class="top">
    <h1>사내 프로젝트 진행 현황 통합 대시보드</h1>
    <div class="user"><span id="currentUserLabel"></span><button type="button" class="btn light" onclick="logout()">로그아웃</button></div>
  </header>
  <div class="bar">
    <div><h2 id="dashboardTitle">업무 현황</h2><p id="dashboardSubtitle" class="muted">팀원별 현재 업무와 프로젝트 상세 현황을 확인합니다.</p></div>
    <button type="button" class="btn" onclick="openProjectModal()">프로젝트 등록</button>
  </div>
  <div class="wrap grid">
    <aside><section class="panel"><div class="panel-head"><h2>내 알림</h2></div><div id="noticeList" class="notice-list"></div></section></aside>
    <section>
      <section class="panel"><div class="panel-head"><h2>팀원별 현재 업무현황</h2><span class="muted">상태 매트릭스</span></div><div class="table-scroll"><table><thead><tr><th>팀원</th><th>진행 중</th><th>대기</th><th>완료</th><th>마감 임박</th><th>미확인 댓글</th><th>현재 진행 업무</th></tr></thead><tbody id="teamBody"></tbody></table></div></section>
      <section class="panel"><div class="panel-head"><h2 id="primaryTitle">업무 목록</h2><span id="primaryCount" class="muted"></span></div><div class="table-scroll"><table><thead><tr><th>프로젝트명</th><th>담당자</th><th>만기일</th><th>상태</th><th>확인</th></tr></thead><tbody id="primaryBody"></tbody></table></div></section>
      <section id="secondaryPanel" class="panel"><div class="panel-head"><h2>본인 외 업무</h2><span id="secondaryCount" class="muted"></span></div><div class="table-scroll"><table><thead><tr><th>프로젝트명</th><th>담당자</th><th>만기일</th><th>상태</th><th>확인</th></tr></thead><tbody id="secondaryBody"></tbody></table></div></section>
      <section id="detailPanel" class="panel hidden">
        <div class="panel-head"><h2 id="detailTitle"></h2><select id="detailStatus" onchange="updateStatus(this.value)"><option>대기 중</option><option>진행 중</option><option>완료</option></select></div>
        <div class="detail-meta"><span><b>담당자:</b> <span id="detailAssignee"></span></span><span><b>만기일:</b> <span id="detailDue"></span></span><span><b>미확인 댓글:</b> <span id="detailUnread"></span></span></div>
        <div id="detailContent" class="content"></div>
        <h3>피드백 및 댓글 기록</h3>
        <div id="commentList"></div>
        <form id="commentForm" class="comment-form"><input id="commentInput" required placeholder="피드백이나 진행 상황을 남겨주세요."><button type="submit" class="btn gray">등록</button></form>
      </section>
    </section>
  </div>
</main>

<div id="projectModal" class="modal-back" onclick="if(event.target.id==='projectModal')closeProjectModal()">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head"><div><h2>새 프로젝트 등록</h2><p class="muted">담당자, 만기일, 진행 상태를 지정합니다.</p></div><button type="button" class="btn gray" onclick="closeProjectModal()">닫기</button></div>
    <form id="projectForm">
      <div class="field"><label for="pTitle">프로젝트명</label><input id="pTitle" required></div>
      <div class="field"><label for="pAssignee">담당자</label><select id="pAssignee" required></select></div>
      <div class="field"><label for="pDue">만기일</label><input id="pDue" type="date" required></div>
      <div class="field"><label for="pStatus">진행 상태</label><select id="pStatus"><option>대기 중</option><option selected>진행 중</option><option>완료</option></select></div>
      <div class="field"><label for="pContent">프로젝트 내용</label><textarea id="pContent" required></textarea></div>
      <div class="actions"><button type="button" class="btn gray" onclick="closeProjectModal()">취소</button><button type="submit" class="btn">등록</button></div>
    </form>
  </div>
</div>

<script>
const SUPABASE_URL = "https://lwwfzwdjaedrfckyduno.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_LGd8ijujuQtCRYQtlrgnqw_EWqvRW50";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null, members = [], projects = [], comments = [], reads = [], activeProjectId = null;
const $ = id => document.getElementById(id);
const h = v => String(v ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const ok = r => { if(r.error) throw r.error; return r.data; };
const member = email => members.find(m => m.email === email);
const assigneeName = p => member(p.assignee_email)?.full_name || p.assignee_email;
const projectComments = id => comments.filter(c => c.project_id === id);
const isRead = (commentId,email) => reads.some(r => r.comment_id === commentId && r.reader_email === email);
const unreadFor = (project,email) => projectComments(project.id).filter(c => c.writer_email !== email && !isRead(c.id,email)).length;
const myUnread = project => currentUser ? unreadFor(project,currentUser.email) : 0;
function daysLeft(project){const t=new Date();t.setHours(0,0,0,0);return Math.ceil((new Date(project.due_date+"T00:00:00")-t)/86400000)}
function dateTime(v){return new Date(v).toLocaleString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})}
function badgeStatus(s){return s==="진행 중"?'<span class="badge prog">진행 중</span>':s==="대기 중"?'<span class="badge wait">대기 중</span>':'<span class="badge done">완료</span>'}
function sortProjects(items){const p={"진행 중":0,"대기 중":1,"완료":2};return [...items].sort((a,b)=>(p[a.status]??9)-(p[b.status]??9)||new Date(a.due_date)-new Date(b.due_date))}
async function loadMembers(){members=ok(await db.from("app_members").select("email,full_name,role,is_active").eq("is_active",true).order("full_name"))}
async function loadData(){await loadMembers();projects=ok(await db.from("projects").select("*").order("due_date",{ascending:true}));comments=ok(await db.from("project_comments").select("*").order("created_at",{ascending:true}));reads=ok(await db.from("comment_reads").select("*"));if(!activeProjectId&&projects.length)activeProjectId=projects[0].id}
function fillAssignees(){ $("pAssignee").innerHTML = members.map(m=>`<option value="${h(m.email)}">${h(m.full_name)} (${h(m.email)})</option>`).join("") }
async function refresh(){await loadData();fillAssignees();render()}
function renderNotices(){const out=[];projects.forEach(p=>{const u=myUnread(p);if(u>0)out.push(`<button class="notice red" onclick="selectProject('${p.id}')"><span>${h(p.title)}</span><b>댓글 ${u}개</b></button>`);const d=daysLeft(p);const mine=currentUser.role==="admin"||p.assignee_email===currentUser.email;if(mine&&p.status!=="완료"&&[1,2,3].includes(d))out.push(`<button class="notice orange" onclick="selectProject('${p.id}')"><span>${h(p.title)}</span><b>D-${d}</b></button>`)});$("noticeList").innerHTML=out.length?out.join(""):'<div class="muted">현재 확인할 알림이 없습니다.</div>'}
function renderTeam(){const rows=members.map(m=>{const assigned=projects.filter(p=>p.assignee_email===m.email),prog=assigned.filter(p=>p.status==="진행 중"),wait=assigned.filter(p=>p.status==="대기 중"),done=assigned.filter(p=>p.status==="완료"),due=assigned.filter(p=>p.status!=="완료"&&[1,2,3].includes(daysLeft(p))),unread=assigned.reduce((n,p)=>n+unreadFor(p,m.email),0);const tasks=prog.length?prog.map(p=>`<button class="notice" onclick="selectProject('${p.id}')"><span>${h(p.title)}</span><b>${h(p.due_date)}</b></button>`).join(""):'<span class="muted">진행 중 업무 없음</span>';return `<tr><td><b>${h(m.full_name)}</b></td><td><span class="badge prog">${prog.length}</span></td><td><span class="badge wait">${wait.length}</span></td><td><span class="badge done">${done.length}</span></td><td><span class="badge ${due.length?'alert':'soft'}">${due.length}</span></td><td><span class="badge ${unread?'alert':'soft'}">${unread}</span></td><td>${tasks}</td></tr>`});$("teamBody").innerHTML=rows.join("")}
function renderRows(items,bodyId){if(!items.length){$(bodyId).innerHTML='<tr><td colspan="5" class="muted">표시할 프로젝트가 없습니다.</td></tr>';return}$(bodyId).innerHTML=sortProjects(items).map(p=>{const d=daysLeft(p),u=myUnread(p),due=p.status!=="완료"&&[1,2,3].includes(d)?`<span class="badge alert">D-${d}</span>`:"",read=u?`<span class="badge alert">읽어야 할 댓글 ${u}</span>`:'<span class="badge soft">확인 완료</span>';return `<tr class="${p.id===activeProjectId?'active':''}" onclick="selectProject('${p.id}')"><td><div class="title-cell"><b>${h(p.title)}</b>${due}</div></td><td>${h(assigneeName(p))}</td><td>${h(p.due_date)}</td><td>${badgeStatus(p.status)}</td><td>${read}</td></tr>`}).join("")}
function renderTables(){const admin=currentUser.role==="admin",mine=projects.filter(p=>p.assignee_email===currentUser.email),others=projects.filter(p=>p.assignee_email!==currentUser.email);$("secondaryPanel").classList.toggle("hidden",admin);if(admin){$("dashboardTitle").innerText="전체 업무 현황";$("primaryTitle").innerText="전체 업무";$("primaryCount").innerText=`${projects.length}건`;renderRows(projects,"primaryBody")}else{$("dashboardTitle").innerText="내 업무 현황";$("primaryTitle").innerText="내 업무";$("primaryCount").innerText=`${mine.length}건`;$("secondaryCount").innerText=`${others.length}건`;renderRows(mine,"primaryBody");renderRows(others,"secondaryBody")}}
function renderDetail(){const p=projects.find(x=>x.id===activeProjectId);if(!p){$("detailPanel").classList.add("hidden");return}$("detailPanel").classList.remove("hidden");$("detailTitle").innerText=p.title;$("detailAssignee").innerText=`${assigneeName(p)} (${p.assignee_email})`;$("detailDue").innerText=p.due_date;$("detailUnread").innerText=`${myUnread(p)}개`;$("detailContent").innerText=p.content||"";$("detailStatus").value=p.status;const pcs=projectComments(p.id);$("commentList").innerHTML=pcs.length?pcs.map(c=>{const u=c.writer_email!==currentUser.email&&!isRead(c.id,currentUser.email),w=member(c.writer_email);return `<div class="comment ${u?'unread':''}"><div class="comment-meta"><b>${h(w?.full_name||c.writer_email)} (${h(c.writer_email)})</b><span>${dateTime(c.created_at)}${u?' · 미확인':''}</span></div><div>${h(c.body)}</div></div>`}).join(""):'<div class="muted">아직 등록된 피드백이 없습니다.</div>'}
function render(){$("currentUserLabel").innerText=`${currentUser.full_name} ${currentUser.role==="admin"?"관리자":"팀원"}`;renderNotices();renderTeam();renderTables();renderDetail()}
async function selectProject(id){activeProjectId=id;try{await db.rpc("mark_project_comments_read",{target_project_id:id});await refresh()}catch(e){console.error(e);render()}}
async function updateStatus(status){if(!activeProjectId)return;try{ok(await db.from("projects").update({status}).eq("id",activeProjectId));await refresh()}catch(e){alert("상태 변경 실패: "+e.message)}}
function openProjectModal(){$("projectModal").classList.add("open");setTimeout(()=>$("pTitle").focus(),0)}
function closeProjectModal(){$("projectModal").classList.remove("open")}
async function logout(){await db.auth.signOut();currentUser=null;activeProjectId=null;$("loginScreen").classList.remove("hidden");$("app").style.display="none"}
async function loadSignedInUser(){const auth=ok(await db.auth.getUser()).user,email=auth.email.toLowerCase();await loadMembers();const m=member(email);if(!m){await db.auth.signOut();$("loginError").innerText="등록된 팀원 계정이 아닙니다.";return}currentUser=m;$("loginScreen").classList.add("hidden");$("app").style.display="block";await refresh()}
$("loginForm").addEventListener("submit",async e=>{e.preventDefault();$("loginError").innerText="";const email=$("loginEmail").value.trim().toLowerCase(),password=$("loginPassword").value;const r=await db.auth.signInWithPassword({email,password});if(r.error){$("loginError").innerText=r.error.message;return}await loadSignedInUser()});
$("projectForm").addEventListener("submit",async e=>{e.preventDefault();try{const payload={title:$("pTitle").value.trim(),assignee_email:$("pAssignee").value,due_date:$("pDue").value,status:$("pStatus").value,content:$("pContent").value.trim(),created_by_email:currentUser.email};const row=ok(await db.from("projects").insert(payload).select("id").single());activeProjectId=row.id;e.target.reset();closeProjectModal();await refresh()}catch(err){alert("프로젝트 등록 실패: "+err.message)}});
$("commentForm").addEventListener("submit",async e=>{e.preventDefault();const input=$("commentInput");if(!activeProjectId||!input.value.trim())return;try{const row=ok(await db.from("project_comments").insert({project_id:activeProjectId,writer_email:currentUser.email,body:input.value.trim()}).select("id").single());await db.from("comment_reads").insert({comment_id:row.id,reader_email:currentUser.email});input.value="";await refresh()}catch(err){alert("댓글 등록 실패: "+err.message)}});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeProjectModal()});
(async()=>{const {data}=await db.auth.getSession();if(data.session)await loadSignedInUser()})();
</script>
</body>
</html>
