<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#12615d" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
    <title>BNOW 추천정부과제</title>
  </head>
  <body>
    <main class="workspace-shell recommendation-page">
      <header class="page-header">
        <div>
          <p class="eyebrow">BNOW Workspace</p>
          <h1>추천정부과제</h1>
        </div>
        <div class="header-actions">
          <a class="ghost-button nav-button" href="./">정부과제 리스트</a>
          <a class="ghost-button nav-button" href="../" target="_top">워크보드</a>
          <button class="primary-button" id="fetchRecommendationsButton" type="button">새로 추천받기</button>
        </div>
      </header>

      <section class="recommendation-panel" aria-label="추천 검색조건">
        <div class="panel-title-row">
          <div>
            <h2>검색조건</h2>
            <p class="helper-text">회사정보와 관심 조건을 수정한 뒤 새로 추천받기를 누르면 추천 점수에 반영됩니다.</p>
          </div>
          <button class="ghost-button" id="saveRecommendationProfileButton" type="button">회사정보 저장</button>
        </div>

        <div class="recommendation-profile">
          <label><span>관심 키워드</span><input id="recommendationKeywords" type="text" /></label>
          <label><span>지역</span><input id="recommendationRegions" type="text" /></label>
          <label><span>대상</span><input id="recommendationTargets" type="text" /></label>
        </div>

        <details class="recommendation-company-profile" open>
          <summary>회사정보</summary>
          <div class="recommendation-profile-grid">
            <label class="wide-field"><span>회사정보 요약</span><textarea id="recommendationCompanySummary" rows="6"></textarea></label>
            <label class="wide-field"><span>제품/기술 키워드</span><input id="recommendationProducts" type="text" /></label>
            <label><span>설립연도</span><input id="recommendationFoundedYear" type="number" min="1900" max="2100" /></label>
            <label><span>직원수</span><input id="recommendationEmployeeCount" type="number" min="0" placeholder="확인 후 입력" /></label>
            <label><span>매출/단계</span><input id="recommendationRevenueRange" type="text" /></label>
            <label class="wide-field"><span>인증/특허/보유역량</span><input id="recommendationCertifications" type="text" /></label>
            <label class="wide-field"><span>정부과제/사업화 이력</span><input id="recommendationPreviousProjects" type="text" /></label>
            <label class="wide-field"><span>선호 사업유형</span><input id="recommendationPreferredPrograms" type="text" /></label>
            <label class="wide-field"><span>제외 키워드</span><input id="recommendationAvoidKeywords" type="text" /></label>
          </div>
        </details>

        <div class="recommendation-logic-note" id="recommendationMeta">
          추천정부과제는 별도 화면에서만 조회하고, 추가한 공고만 정부과제 리스트에 저장합니다.
        </div>
      </section>

      <section class="recommendation-results" aria-label="추천 과제목록">
        <div class="panel-title-row">
          <h2>추천 과제목록</h2>
          <div class="recommendation-result-actions">
            <a class="ghost-button nav-button" href="./">정부과제 리스트로 이동</a>
          </div>
        </div>
        <div class="recommendation-list" id="recommendationList">
          <div class="recommendation-empty">새로 추천받기를 누르면 추천 과제가 표시됩니다.</div>
        </div>
      </section>
    </main>

    <script src="recommendations.js"></script>
  </body>
</html>
