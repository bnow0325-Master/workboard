function renderAssigneeFilters(){const selected=assigneeFilter==="all"?"전체":memberName(assigneeFilter);$("assigneeToggle").classList.toggle("active",showAssigneeFilters);$("assigneeFilters").classList.toggle("hidden",!showAssigneeFilters);$("assigneeFilters").innerHTML=`<button type="button" class="assignee-filter ${assigneeFilter==="all"?"active":""}" onclick="setAssigneeFilter('all')">전체</button>`+[...members].sort((a,b)=>teamRank(a)-teamRank(b)||a.full_name.localeCompare(b.full_name,"ko")).map(m=>`<button type="button" class="assignee-filter ${assigneeFilter===m.email?"active":""}" onclick="setAssigneeFilter('${h(m.email)}')">${h(m.full_name)}</button>`).join("");return selected}
function renderRows(items,bodyId){if(!items.length){$(bodyId).innerHTML='<tr><td colspan="6" class="muted">표시할 프로젝트가 없습니다.</td></tr>';return}$(bodyId).innerHTML=sortProjects(items).map(p=>{const d=daysLeft(p),due=!["완료","보관"].includes(p.status)&&[1,2,3].includes(d)?`<span class="badge alert">D-${d}</span>`:"";return`<tr class="${p.id===activeProjectId?'active-row':''}" onclick="selectProject('${p.id}',${myPending(p)>0})"><td><div class="title-cell"><b>${h(p.title)}</b>${due}</div></td><td>${h(assigneeName(p))}</td><td>${h(p.due_date)}</td><td>${badgeStatus(p.status)}</td><td>${confirmBadge(p)}</td><td>${actionButtons(p)}</td></tr>`}).join("")}
function renderTables(){const showAll=workFilter==="all",base=showAll?projects:projects.filter(p=>p.assignee_email===currentUser.email),scope=assigneeFilter==="all"?base:base.filter(p=>p.assignee_email===assigneeFilter),items=scope.filter(p=>listMode==="archived"?p.status==="보관":listMode==="completed"?p.status==="완료":!["완료","보관"].includes(p.status)),assigneeLabel=renderAssigneeFilters();$("workFilter").value=workFilter;$("activeTab").classList.toggle("active",listMode==="active");$("completedTab").classList.toggle("active",listMode==="completed");$("archivedTab").classList.toggle("active",listMode==="archived");$("dashboardTitle").innerText=assigneeFilter!=="all"?`${assigneeLabel} 업무 현황`:showAll?"전체 업무 현황":"내 업무 현황";$("dashboardSubtitle").innerText=assigneeFilter!=="all"?`${assigneeLabel} 담당 업무를 진행중목록, 완료목록, 보관목록으로 확인합니다.`:showAll?"전체 업무를 진행중목록, 완료목록, 보관목록으로 확인합니다.":"내 담당 업무를 진행중목록, 완료목록, 보관목록으로 확인합니다.";$("primaryTitle").innerText=listMode==="archived"?"보관목록":listMode==="completed"?"완료목록":"진행중목록";$("primaryCount").innerText=`${items.length}건`;renderTableHead();renderRows(items,"primaryBody")}
function renderDetail(){const p=projectById(activeProjectId);if(!p){$("detailPanel").classList.add("hidden");return}$("detailPanel").classList.remove("hidden");$("detailTitle").innerText=p.title;$("detailAssignee").innerText=`${assigneeName(p)} (${p.assignee_email})`;$("detailDue").innerText=p.due_date;$("detailConfirm").innerText=`${pendingConfirmRequests(p).length}건`;$("detailContent").innerText=p.content||"";$("detailStatus").value=p.status;$("detailStatus").disabled=!canEdit(p);$("editDetailBtn").classList.toggle("hidden",!canEdit(p));$("completeDetailBtn").classList.toggle("hidden",!canEdit(p)||p.status==="완료");fillCommentRecipients();const done=confirmedIds(),pcs=projectComments(p.id);$("commentList").innerHTML=pcs.length?pcs.map(c=>{const req=confirmRequest(c),doneId=confirmDone(c),isReq=!!req,isDone=!!doneId,inlineDone=isInlineConfirmed(c),canConfirm=canInlineConfirm(c),w=member(c.writer_email),edited=c.updated_at&&new Date(c.updated_at)-new Date(c.created_at)>1000,text=commentDisplayText(c);let cls=isReq?(done.has(req.id)?"confirmed":"need-confirm"):"";if(commentTargets(c,currentUser.email)&&!isRead(c.id,currentUser.email))cls+=" unread";const confirmButton=canConfirm?`<button type="button" class="btn small green" onclick="confirmRequestDone('${c.id}')">확인완료</button>`:"";const editButton=canEditComment(c)?`<button type="button" class="btn small gray" onclick="editComment('${c.id}')">수정</button>`:"";const deleteButton=canDeleteComment()?`<button type="button" class="btn small danger" onclick="deleteComment('${c.id}')">삭제</button>`:"";const actions=confirmButton||editButton||deleteButton?`<div class="comment-actions">${confirmButton}${editButton}${deleteButton}</div>`:"";return`<div class="comment ${cls}"><div class="comment-meta"><b>${h(w?.full_name||c.writer_email)} (${h(c.writer_email)})</b><span>${dateTime(c.created_at)}${edited?` · 수정 ${dateTime(c.updated_at)}`:""}${isReq&&!done.has(req.id)?' · 확인요망':''}${isReq&&done.has(req.id)?' · 확인완료':''}${isDone?' · 확인완료 기록':''}</span></div><div class="comment-body">${h(text)}${inlineDone?'<br>[확인완료]':""}</div>${actions}</div>`}).join(""):'<div class="muted">아직 등록된 피드백이 없습니다.</div>'}
function render(){$("currentUserLabel").innerText=`${currentUser.full_name} ${currentUser.role==="admin"?"관리자":"팀원"}`;$("idPwMenuBtn").classList.toggle("hidden",!canManageIdPw());renderNotices();renderTeam();renderTables();renderDetail();renderIdPwTable()}
async function selectProject(id,focusFeedback=false){activeProjectId=id;try{await db.rpc("mark_project_comments_read",{target_project_id:id});await refresh();if(focusFeedback)goFeedback()}catch(e){console.error(e);render();if(focusFeedback)goFeedback()}}
async function updateStatus(status){const p=projectById(activeProjectId);if(!p||!canEdit(p))return;try{ok(await db.from("projects").update({status}).eq("id",activeProjectId));await refresh()}catch(e){alert("상태 변경 실패: "+e.message)}}
function resetProjectForm(){editingProjectId=null;$("projectForm").reset();$("pStatus").value="진행 중";$("projectModalTitle").innerText="새 프로젝트 등록";$("projectSubmitBtn").innerText="등록"}
function openProjectModal(id=null){fillAssignees();resetProjectForm();if(id){const p=projectById(id);if(!p||!canEdit(p))return;editingProjectId=id;$("projectModalTitle").innerText="프로젝트 수정";$("projectSubmitBtn").innerText="저장";$("pTitle").value=p.title;$("pAssignee").value=p.assignee_email;$("pDue").value=p.due_date;$("pStatus").value=p.status;$("pContent").value=p.content||""}$("projectModal").classList.add("open");setTimeout(()=>$("pTitle").focus(),0)}
function closeProjectModal(){$("projectModal").classList.remove("open");resetProjectForm()}
function editActiveProject(){if(activeProjectId)openProjectModal(activeProjectId)}
async function completeProject(id){const p=projectById(id);if(!p||!canEdit(p)||p.status==="완료")return;try{ok(await db.from("projects").update({status:"완료"}).eq("id",id));if(activeProjectId===id&&listMode==="active")listMode="completed";await refresh()}catch(e){alert("완료 처리 실패: "+e.message)}}
function completeActiveProject(){if(activeProjectId)completeProject(activeProjectId)}
async function logout(){await db.auth.signOut();currentUser=null;activeProjectId=null;$("loginScreen").classList.remove("hidden");$("app").style.display="none"}
async function loadSignedInUser(){const auth=ok(await db.auth.getUser()).user,email=auth.email.toLowerCase();await loadMembers();const m=member(email);if(!m){await db.auth.signOut();$("loginError").innerText="등록된 팀원 계정이 아닙니다.";return}currentUser=m;workFilter=m.role==="admin"?"all":"mine";$("loginScreen").classList.add("hidden");$("app").style.display="block";await refresh();if(canManageIdPw()){const mergedEntries=mergeIdPwEntries(defaultIdPwEntries(),idPwProjectRow?readIdPwEntries():[]);const currentSerialized=JSON.stringify(idPwProjectRow?readIdPwEntries():[]),mergedSerialized=JSON.stringify(mergedEntries);if(currentSerialized!==mergedSerialized){await saveIdPwEntries(mergedEntries);await refresh()}}}
async function submitComment(){const input=$("commentInput"),recipient=$("commentRecipient").value;if(!activeProjectId||!input.value.trim())return;try{const id=crypto.randomUUID(),body=`[확인요망:${id}:${recipient}]\n${input.value.trim()}`;const row=ok(await db.from("project_comments").insert({id,project_id:activeProjectId,writer_email:currentUser.email,body}).select("id").single());await db.from("comment_reads").insert({comment_id:row.id,reader_email:currentUser.email});input.value="";await refresh()}catch(err){alert("댓글 등록 실패: "+err.message)}}
async function editComment(id){const c=comments.find(x=>x.id===id);if(!c||!canEditComment(c))return;const next=prompt("수정할 댓글 내용을 입력하세요.",commentDisplayText(c));if(next===null)return;const text=next.trim();if(!text)return;try{const body=[c.body&&commentParts(c.body).prefix?commentParts(c.body).prefix:"",text,isInlineConfirmed(c)?"[확인완료]":""].filter(Boolean).join("\n");ok(await db.from("project_comments").update({body}).eq("id",id));await refresh()}catch(err){alert("댓글 수정 실패: "+err.message)}}
async function deleteComment(id){const c=comments.find(x=>x.id===id);if(!c||!canDeleteComment())return;if(!confirm("이 댓글을 삭제할까요? 삭제는 추동현 관리자만 가능합니다."))return;try{ok(await db.from("project_comments").delete().eq("id",id));await refresh()}catch(err){alert("댓글 삭제 실패: "+err.message)}}
async function confirmRequestDone(commentId){const c=comments.find(x=>x.id===commentId);if(!c||!canInlineConfirm(c))return;try{const body=[commentParts(c.body).prefix,commentDisplayText(c),"[확인완료]"].filter(Boolean).join("\n");ok(await db.from("project_comments").update({body}).eq("id",commentId));await refresh();if(activeProjectId===c.project_id)goFeedback()}catch(err){alert("확인완료 처리 실패: "+err.message)}}
$("loginForm").addEventListener("submit",async e=>{e.preventDefault();$("loginError").innerText="";const email=$("loginEmail").value.trim().toLowerCase(),password=$("loginPassword").value;const r=await db.auth.signInWithPassword({email,password});if(r.error){$("loginError").innerText=r.error.message;return}await loadSignedInUser()});
$("projectForm").addEventListener("submit",async e=>{e.preventDefault();try{const payload={title:$("pTitle").value.trim(),assignee_email:$("pAssignee").value,due_date:$("pDue").value,status:$("pStatus").value,content:$("pContent").value.trim()};let row;if(editingProjectId){row=ok(await db.from("projects").update(payload).eq("id",editingProjectId).select("id").single())}else{payload.created_by_email=currentUser.email;row=ok(await db.from("projects").insert(payload).select("id").single())}activeProjectId=row.id;closeProjectModal();await refresh()}catch(err){alert("저장 실패: "+err.message)}});
$("commentForm").addEventListener("submit",async e=>{e.preventDefault();await submitComment()});
$("idPwForm").addEventListener("submit",async e=>{e.preventDefault();if(!canManageIdPw())return;try{const siteUrl=normalizeSiteUrl($("idPwSiteUrl").value.trim()),nextItem={id:editingIdPwId||crypto.randomUUID(),siteName:$("idPwSiteName").value.trim(),siteUrl,loginId:$("idPwLoginId").value.trim(),loginPw:$("idPwLoginPw").value.trim(),note:$("idPwNote").value.trim(),updatedAt:new Date().toISOString()};const nextEntries=editingIdPwId?idPwEntries.map(item=>item.id===editingIdPwId?nextItem:item):[nextItem,...idPwEntries];await saveIdPwEntries(nextEntries);resetIdPwForm()}catch(err){alert("ID/PW 저장 실패: "+err.message)}});
$("idPwSearch").addEventListener("input",e=>{idPwSearchTerm=e.target.value;renderIdPwTable()});
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeProjectModal();closeIdPwModal()}});
(async()=>{const{data}=await db.auth.getSession();if(data.session)await loadSignedInUser()})();
</script>
